site_name: CPV — Cycle Position Vector
site_description: Décomposition multi-cycles falsifiable des indicateurs macroéconomiques
site_url: https://s-geffroy.github.io/EcoWave/
repo_url: https://github.com/s-geffroy/EcoWave
repo_name: s-geffroy/EcoWave

# `_includes/*.md` are snippets stitched into pages via pymdownx.snippets; they
# are not standalone documents and would otherwise be flagged as unreferenced
# under `--strict`.
exclude_docs: |
  _includes/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mode clair
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      check_paths: true
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

