site_name: CPV — Cycle Position Vector
site_description: La macroéconomie comme dynamique fractale non-linéaire à mémoire longue avec dérive de régime cognitif — démontrée empiriquement, validée opérationnellement.
site_url: https://s-geffroy.github.io/EcoWave/
repo_url: https://github.com/s-geffroy/EcoWave
repo_name: s-geffroy/EcoWave

# `_includes/*.md` are snippets stitched into pages via pymdownx.snippets; they
# are not standalone documents and would otherwise be flagged as unreferenced
# under `--strict`.
exclude_docs: |
  _includes/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mode clair
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      check_paths: true
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  # Material icons (:material-book-open-variant:, :material-bank:, etc.)
  # rendered as SVG via twemoji index + material's SVG generator.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# MathJax 3 — ES6 modules natifs, plus de polyfill.io requis.
# Note : polyfill.io a été compromis en juin 2024 (supply-chain attack
# documentée par Sansec) ; toute référence à ce domaine a été retirée.
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

