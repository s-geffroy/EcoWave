site_name: CPV — Cycle Position Vector
site_description: Reproducible multi-cycle decomposition of macro indicators with three falsifiability gates
site_url: https://s-geffroy.github.io/EcoWave/
repo_url: https://github.com/s-geffroy/EcoWave
repo_name: s-geffroy/EcoWave

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Methodology:
      - CPV protocol: methodology/multi_cycle_decomposition.md
      - Cycle validation rules: methodology/cycle_validation_rules.md
      - Cycle-methods survey: methodology/cycle_methods_survey.md
      - Composite indicator (intensity + diffusion): methodology/composite_indicator.md
      - Normalization rules: methodology/normalization_rules.md
      - Anti-pseudoscience rules: methodology/anti_pseudoscience_rules.md
      - Reference windows: methodology/reference_windows.md
      - Improvement roadmap: methodology/improvement_roadmap.md
  - Cycles:
      - Kitchin (3–5 y): cycles/kitchin.md
      - Juglar (7–11 y): cycles/juglar.md
      - Kuznets (15–25 y): cycles/kuznets.md
      - Kondratieff (40–60 y): cycles/kondratieff.md
  - Groups (WLD, HIC, OECD…): groups.md
  - Current report (World Bank): reports/cycle_position_2026_05_wb.md
  - Current report (Long history): reports/cycle_position_2026_05_long.md
  - Analyses:
      - Juglar US/ANGLO vs NORDIC 2022-2026: reports/juglar_us_anglo_nordic_2026.md
  - EWS validation: reports/ews_validation.md
  - Sources: sources.md
