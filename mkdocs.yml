      - Histoire longue (1870-2022): reports/cycle_position_2026_05_long.md
      - Bank of England Millennium (1700-2016): reports/cycle_position_2026_05_boe.md
      - BIS macroprudential (EM + AE, 1970-2025): reports/cycle_position_2026_05_bis.md
      - "Sectoral history (FRED+OWID+BEIS, test Wen 2005)": reports/cycle_position_2026_05_sh.md
