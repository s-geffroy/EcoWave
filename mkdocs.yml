site_name: CPV — Cycle Position Vector
site_description: Décomposition multi-cycles falsifiable des indicateurs macroéconomiques
site_url: https://s-geffroy.github.io/EcoWave/
repo_url: https://github.com/s-geffroy/EcoWave
repo_name: s-geffroy/EcoWave

# `_includes/*.md` are snippets stitched into pages via pymdownx.snippets; they
# are not standalone documents and would otherwise be flagged as unreferenced
# under `--strict`.
exclude_docs: |
  _includes/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mode clair
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      check_paths: true
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Accueil: index.md
  - 1. Où en sommes-nous ?:
      - Synthèse multi-horizons: reports/cycle_position_synthesis.md
      - Panel Banque mondiale (1960-2024): reports/cycle_position_2026_05_wb.md
      - Panel trimestriel (Path 5): reports/cycle_position_2026_05_q.md
      - Histoire longue (1870-2022): reports/cycle_position_2026_05_long.md
  - 2. Pourquoi ? — Cycles canoniques:
      - Kitchin (3–5 ans): cycles/kitchin.md
      - Juglar (7–11 ans): cycles/juglar.md
      - Kuznets (15–25 ans): cycles/kuznets.md
      - Kondratieff (40–60 ans): cycles/kondratieff.md
  - 3. Comment ? — Protocole CPV:
      - Vue d'ensemble: methodology/protocole_cpv.md
      - Trois portes de falsifiabilité: methodology/trois_portes.md
      - Méthodes de décomposition: methodology/methodes_decomposition.md
      - Indicateur composite: methodology/indicateur_composite.md
      - Normalisation: methodology/normalisation.md
      - Garde-fous anti-pseudoscience: methodology/garde_fous.md
      - Fenêtres de référence: methodology/fenetres_reference.md
      - Feuille de route: methodology/feuille_de_route.md
  - 4. Preuves détaillées:
      - Panel Banque mondiale (note signée): reports/panel_banque_mondiale_2026.md
      - Panel trimestriel (note signée): reports/panel_trimestriel_2026.md
      - Histoire longue (note signée): reports/histoire_longue_2026.md
      - Juglar — US/ANGLO vs NORDIC: reports/juglar_us_anglo_nordic_2026.md
      - Kondratieff K5 — ADV18/EU4: reports/kondratieff_adv18_eu4_2026.md
      - Validation EWS (holdout): reports/validation_ews.md
  - 5. Données & références:
      - Groupes agrégés: groupes.md
      - Sources de données: sources.md
      - Bibliographie: bibliographie.md
