services:
  ecowave:
    build: .
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./data_raw:/app/data_raw
      - ./data_processed:/app/data_processed
      - ./events:/app/events
      - ./reports:/app/reports
      - ./figures:/app/figures
      - ./methodology:/app/methodology
      - ./annotations:/app/annotations
      - ./docs:/app/docs
      - ./scripts:/app/scripts
      - ./sources_manifest.json:/app/sources_manifest.json
      - ./cycles_manifest.json:/app/cycles_manifest.json
      - ./long_history_manifest.json:/app/long_history_manifest.json
      - ./quarterly_manifest.json:/app/quarterly_manifest.json
      - ./boe_millennium_manifest.json:/app/boe_millennium_manifest.json
      - ./bis_manifest.json:/app/bis_manifest.json
      - ./sectoral_history_manifest.json:/app/sectoral_history_manifest.json
      - ./mkdocs.yml:/app/mkdocs.yml
    ports:
      - "8000:8000"
    working_dir: /app
