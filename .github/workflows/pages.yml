name: Deploy MkDocs site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MkDocs Material
        run: pip install mkdocs-material==9.5.30
      - name: Sync methodology into docs
        run: |
          cp methodology/*.md docs/methodology/
          cp variable_dictionary.md docs/methodology/variable_dictionary.md
          cp scoring_rules.md docs/methodology/scoring_rules.md
          cp model_comparison.md docs/methodology/model_comparison.md
      - name: Build site
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
